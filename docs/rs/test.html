    :root {

    body {
      font-family: "Source Code Pro", monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      margin: 0;
      padding: 20px;
    }

      max-width: 800px;

    }

      color: var(--accent);
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    input[type="text"], textarea {
      font-family: "Source Code Pro", monospace;
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: var(--bg);
      border: 2px solid var(--accent);
      color: var(--text);
      box-sizing: border-box;
    }
    
    textarea {
      min-height: 60px;
      resize: vertical;
    }
    
    .card {
      background: var(--bg);
      padding: 16px;
      margin-bottom: 16px;
      border: 2px solid var(--accent);
    }
    
    .options {
      display: grid;
      gap: 8px;
      margin: 10px 0;
    }
    
    .option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
    }
    
    .option input {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--accent);
      background: transparent;
      margin-top: 3px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      display: grid;
      place-content: center;
    }

    .option input:checked {
      background: var(--accent);
    }

    .option input:checked::before {
      content: "";
      width: 10px;
      height: 10px;
      background-color: var(--accent);
    }

    .option input:hover {
      background: rgba(255, 143, 92, 0.2);
    }
    
    button {
      background: var(--accent);
      font-family: "Source Code Pro", monospace;
      color: var(--dark);
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-top: 10px;
    }
    
    button:hover {

    }
    
    .cat-title {

      font-weight: bold;

// MAXIMUM
function computeMaxPossible(qs) {
  const maxPossible = {};
  qs.forEach(q => {
    const qMax = {};
    q.opts.forEach(o => {
      Object.entries(o.s).forEach(([k, v]) => {
        if (qMax[k] === undefined || v > qMax[k]) qMax[k] = v;
      });
    });
    Object.entries(qMax).forEach(([k, v]) => {
      if (v > 0) maxPossible[k] = (maxPossible[k] || 0) + v;
    });
  });
  return maxPossible;
}

// NORMALIZATION
function normalize(rawScores, maxPossible) {
  const out = {};
  Object.entries(rawScores).forEach(([k, v]) => {
    const max = maxPossible[k] || 1;
    out[k] = Math.round(Math.max(0, Math.min(10, (v / max) * 10)));
  });
  return out;
}

// DEFAULT
const ALL_KEYS = [
  "worldbuilding","env_story","pacing","puzzle","dialogue",
  "progression","economy","inventory","combat","choice",
  "char_art","env_art","ui_ux","portrait","animation",
  "dialogue_script","gameplay_logic","data_mgmt","save_load","tooling",
  "music","emotional_score","sfx",
  "content_volume","branch_tracking","comm","adaptability"
];

function emptyScores() {
  return Object.fromEntries(ALL_KEYS.map(k => [k, 0]));
}

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function prepareOptions(opts) {
  const unsure = opts.find(o => o.t.startsWith('затрудняюсь'));
  const others = opts.filter(o => !o.t.startsWith('затрудняюсь'));
  return [...shuffle(others), ...(unsure ? [unsure] : [])];
}

// RENDER
const form = document.getElementById('quizForm');
let currentCat = '';
questions.forEach(q => {
  if (q.cat !== currentCat) {
    currentCat = q.cat;
    const h = document.createElement('h3');
    h.className = 'cat-title';
    h.textContent = currentCat;
    form.appendChild(h);
  }
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="q-id">вопрос ${q.id}</div>
    <strong>${q.text}</strong>
    <div class="options">
      ${prepareOptions(q.opts).map(o =>
        `<label class="option">
          <input type="radio" name="${q.id}" value="${o.k}">
          <span>${o.t}</span>
        </label>`
      ).join('')}
    </div>
    <textarea id="txt_${q.id}" placeholder="комментарий к ответу (необязателен)..."></textarea>`;
  form.appendChild(card);
});

// DOWNLOAD
function generateAndDownload() {
  const name = document.getElementById('empName').value.trim();
  if (!name) { alert('введите имя сотрудника'); return; }

  const rawScores = emptyScores();
  const answers = [];

  for (const q of questions) {
    const selected = form.querySelector(`input[name="${q.id}"]:checked`);
    if (!selected) { alert(`пожалуйста, выберите вариант для вопроса ${q.id}`); return; }
    const opt = q.opts.find(o => o.k === selected.value);
    Object.entries(opt.s).forEach(([k, v]) => rawScores[k] += v);
    answers.push({ q_id: q.id, selected: opt.k, text_response: document.getElementById(`txt_${q.id}`).value });
  }

  const maxPossible = computeMaxPossible(questions);
  const scores = normalize(rawScores, maxPossible);

  const result = {
    employee: name,
    date: new Date().toISOString(),
    scores,
    raw_scores: rawScores,
    max_possible: maxPossible,
    answers
  };

  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(result, null, 2))));
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([b64], { type: 'text/plain' })),
    download: `test_${name.replace(/\s+/g, '_')}_${Date.now()}.requit`
  });
  a.click();
  URL.revokeObjectURL(a.href);
}
